<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shitakundo Tour Details - Trip Up Cumilla</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      background: #f4f7f8;
      color: #333;
    }
    header {
      background: linear-gradient(90deg, #0088cc, #00c6ff);
      color: white;
      padding: 20px;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 2rem;
    }
    .container {
      width: 90%;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }
    table, th, td {
      border: 1px solid #ddd;
    }
    th, td {
      padding: 10px;
      text-align: left;
    }
    th {
      background-color: #f0f0f0;
    }
    .payment {
      margin-top: 30px;
    }
    .payment h3 {
      color: #0088cc;
    }
    .payment-methods img {
      width: 50px;
      margin: 5px;
    }
    form {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 10px;
    }
    input, select, button {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }
    button {
      background: #00c6ff;
      color: white;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #0088cc;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #333;
      color: white;
      margin-top: 30px;
    }
    a.back-link {
      display: inline-block;
      margin-top: 15px;
      text-decoration: none;
      color: #0088cc;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>Trip Up Cumilla</h1>
    <p>Tour Details & Payment</p>
  </header>

  <div class="container">
    <h2>Shitakundo Tour Details</h2>
   
    <a href="index.html" class="back-link">← Back to Home</a>
  </div>

  <footer>
    <p>&copy; 2025 Trip Up Cumilla | Designed by Shuvro Ahmad</p>
  </footer>

<!-- TUC Popup Start -->
<style>
#tuc-popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    padding: 15px;
}

#tuc-popup-box {
    background: linear-gradient(135deg, #ff4d6d, #ff758f);
    color: #fff;
    width: 100%;
    max-width: 320px;
    border-radius: 18px;
    padding: 25px 20px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    animation: tucPopupFade 0.4s ease;
}

#tuc-popup-box h2 {
    font-size: clamp(16px, 4vw, 20px);
    margin: 0;
    font-weight: 600;
}

#tuc-popup-box button {
    margin-top: 18px;
    padding: 10px 22px;
    border: none;
    border-radius: 30px;
    background: #000;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s ease;
}

#tuc-popup-box button:hover {
    transform: scale(1.05);
    background: #222;
}

@keyframes tucPopupFade {
    from {opacity: 0; transform: scale(0.8);}
    to {opacity: 1; transform: scale(1);}
}
</style>

<div id="tuc-popup-overlay">
    <div id="tuc-popup-box">
        <h2>Tour details will be publish soon</h2>
        <button onclick="document.getElementById('tuc-popup-overlay').style.display='none'">
            OK
        </button>
    </div>
</div>
<!-- TUC Popup End -->
  
</body>
</html>
